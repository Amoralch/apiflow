database:
  driver: sqlite
    path: data/contentflow.db

    scheduler:
      timezone: UTC
        max_queue_size: 500
          retry_on_failure: true
            retry_delay_seconds: 120

            server:
              host: 0.0.0.0
                port: 8400
                  workers: 1
                    reload: false

                    media:
                      upload_dir: data/media
                        max_file_size_mb: 25
                          allowed_extensions:
                              - .jpg
                                  - .jpeg
                                      - .png
                                          - .gif
                                              - .mp4
                                                  - .webp
                                                    thumbnail_size: [320, 320]
                                                      watermark: false

                                                      notifications:
                                                        webhook_url: ""
                                                          on_publish: true
                                                            on_failure: true
                                                              on_sched
